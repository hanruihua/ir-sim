world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [2.0, 5.0, 0.0]
    goal: [2.0, 5.0, 0.0]
    vel_min: [0.0, 0.0]
    vel_max: [0.0, 0.0]
    behavior: {name: 'dash'}

    sensors:
      - type: 'fmcw_lidar2d'
        range_min: 0.0
        range_max: 8.0
        angle_range: 2.0944   # 120 degrees
        number: 121           # approximately 1 degree per beam, including center beam
        motion_compensate: True
        noise: False
        offset: [0.0, 0.0, 0.0]
        alpha: 0.8
        color: 'cyan'
        velocity_linewidth: 2.0
        no_hit_linewidth: 0.25
        no_hit_alpha: 0.01
        show_velocity_markers: True
        velocity_marker_size: 45
        velocity_marker_edge_color: 'black'
        velocity_marker_edge_width: 0.5
        zero_velocity_color: 'cyan'
        positive_velocity_color: 'red'
        negative_velocity_color: 'blue'
        velocity_color_max: 0.6

obstacle:
  - kinematics: {name: 'omni'}
    shape: {name: 'circle', radius: 0.25}
    state: [8.0, 5.0, 0.0]
    goal: [3.0, 5.0, 0.0]
    vel_min: [-0.8, -0.8]
    vel_max: [0.8, 0.8]
    behavior: {name: 'dash'}
    color: 'orangered'
    plot:
      show_goal: True

  - kinematics: {name: 'omni'}
    shape: {name: 'circle', radius: 0.22}
    state: [7.5, 6.8, 0.0]
    goal: [3.2, 4.8, 0.0]
    vel_min: [-0.4, -0.4]
    vel_max: [0.4, 0.4]
    behavior: {name: 'dash'}
    color: 'gold'
    plot:
      show_goal: True

  - kinematics: {name: 'omni'}
    shape: {name: 'circle', radius: 0.20}
    state: [8.6, 3.8, 0.0]
    goal: [3.5, 5.6, 0.0]
    vel_min: [-1.2, -1.2]
    vel_max: [1.2, 1.2]
    behavior: {name: 'dash'}
    color: 'limegreen'
    plot:
      show_goal: True

  - kinematics: {name: 'omni'}
    shape: {name: 'circle', radius: 0.24}
    state: [6.8, 7.6, 0.0]
    goal: [4.6, 6.4, 0.0]
    vel_min: [-0.2, -0.2]
    vel_max: [0.2, 0.2]
    behavior: {name: 'dash'}
    color: 'mediumorchid'
    plot:
      show_goal: True
