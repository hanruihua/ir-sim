# Fog of map revealed by the robot's field of view (FOV) instead of a lidar.
# The robot has no sensors; its fov / fov_radius sector clears the fog as it
# moves and turns (show_fov draws the view wedge).
world:
  height: 20
  width: 20
  step_time: 0.1
  fog_map: true
  control_mode: 'keyboard'  # 'keyboard', 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.3}
    state: [10, 10, 0]
    behavior: {name: 'rvo', wander: true, range_low: [3, 3, -3.14], range_high: [17, 17, 3.14], vxmax: 2, vymax: 2}
    vel_max: [2, 1.5]
    vel_min: [-2, -1.5]
    fov: 2.0            # 90-degree field of view (no lidar)
    fov_radius: 2.0
    plot: {show_fov: True}

obstacle:
  - shape: {name: 'rectangle', length: 3, width: 0.6}
    state: [6, 14, 0.4]
  - shape: {name: 'circle', radius: 1.2}
    state: [14, 6, 0]
