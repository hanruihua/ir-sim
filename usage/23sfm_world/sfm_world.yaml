world:
  height: 20
  width: 20
  step_time: 0.1
  sample_time: 0.1
  offset: [-10, -10]
  collision_mode: 'unobstructed'   # SFM is reactive; let pedestrians overlap briefly
  control_mode: 'auto'


# Twenty-four pedestrians cross a "+" intersection of two 8 m corridors.
# Six head-on pairs run along the horizontal corridor (one W->E and one
# E->W per lane line) and six head-on pairs run along the vertical
# corridor. Each pair shares the same lane line: the W->E goal sits at
# the E->W start position and vice versa. The two opposing agents are
# offset 0.001 m to break exact mirror symmetry (without it, both
# anisotropic-force angles are zero and SFM can't pick a side); the
# offset is below pixel scale so the agents read as travelling on the
# same line. All conflicts happen in the central square, resolved by
# the anisotropic Moussaid-Helbing 2009 social force (ported from
# ``pedsim_ros`` / libpedsim). The L-shaped wall corners enter SFM as
# line obstacles.
robot:
  # ---------------- y = -2.6 lane (W->E + E->W head-on) ----------------
  - kinematics: {name: 'diff'}
    shape: [{name: 'circle', radius: 0.25}]
    state: [-9, -2.6, 0]
    goal:  [ 9, -2.6, 0]
    color: 'royalblue'
    behavior: &sfm_ped
      name: 'sfm'
      vmax: 0.7                        # slow enough for SFM to deflect
      neighbor_threshold: 5.0
      force_factor_social: 5.4
      force_factor_obstacle: 2.0
      gamma: 0.5
      sigma_obstacle: 0.5
      safety_radius: 0.05              # personal-space buffer in SFM:
                                       # repulsion saturates at 0.1 m of
                                       # centre-to-centre clearance, so
                                       # cross-stream agents never reach
                                       # body contact (radius = 0.25)
    vel_min: &vmin [-1.5, -3.0]
    vel_max: &vmax [1.5,  3.0]
    arrive_mode: position
    goal_threshold: 0.3
    plot: &ped_plot
      show_trail: true
      show_goal: true
      trail_fill: true
      trail_alpha: 0.2
      keep_trail_length: 25
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9, -2.601, 3.14], goal: [-9, -2.601, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- y = -1.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-9, -1.6, 0], goal: [ 9, -1.6, 0], color: 'royalblue', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9, -1.601, 3.14], goal: [-9, -1.601, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- y = -0.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-9, -0.6, 0], goal: [ 9, -0.6, 0], color: 'royalblue', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9, -0.601, 3.14], goal: [-9, -0.601, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- y =  0.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-9,  0.6, 0], goal: [ 9,  0.6, 0], color: 'royalblue', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9,  0.599, 3.14], goal: [-9,  0.599, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- y =  1.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-9,  1.6, 0], goal: [ 9,  1.6, 0], color: 'royalblue', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9,  1.599, 3.14], goal: [-9,  1.599, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- y =  2.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-9,  2.6, 0], goal: [ 9,  2.6, 0], color: 'royalblue', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 9,  2.599, 3.14], goal: [-9,  2.599, 3.14], color: 'red', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x = -2.6 lane (S->N + N->S head-on) ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-2.6, -9,  1.5708], goal: [-2.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-2.601,  9, -1.5708], goal: [-2.601, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x = -1.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-1.6, -9,  1.5708], goal: [-1.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-1.601,  9, -1.5708], goal: [-1.601, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x = -0.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-0.6, -9,  1.5708], goal: [-0.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [-0.601,  9, -1.5708], goal: [-0.601, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x =  0.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 0.6, -9,  1.5708], goal: [ 0.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 0.599,  9, -1.5708], goal: [ 0.599, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x =  1.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 1.6, -9,  1.5708], goal: [ 1.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 1.599,  9, -1.5708], goal: [ 1.599, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}

  # ---------------- x =  2.6 lane ----------------
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 2.6, -9,  1.5708], goal: [ 2.6,  9,  1.5708], color: 'green', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}
  - {kinematics: {name: 'diff'}, shape: [{name: 'circle', radius: 0.25}], state: [ 2.599,  9, -1.5708], goal: [ 2.599, -9, -1.5708], color: 'orange', behavior: *sfm_ped, vel_min: *vmin, vel_max: *vmax, arrive_mode: position, goal_threshold: 0.3, plot: *ped_plot}


# Four L-shaped walls bound the four corners of the "+" intersection.
# Each corridor is 8 m wide (walls at +/- 4 m from corridor centreline).
obstacle:
  - shape: {name: 'linestring', vertices: [[-10,  4], [-4,  4], [-4,  10]]}
    state: [0, 0, 0]
    unobstructed: true
  - shape: {name: 'linestring', vertices: [[ 10,  4], [ 4,  4], [ 4,  10]]}
    state: [0, 0, 0]
    unobstructed: true
  - shape: {name: 'linestring', vertices: [[-10, -4], [-4, -4], [-4, -10]]}
    state: [0, 0, 0]
    unobstructed: true
  - shape: {name: 'linestring', vertices: [[ 10, -4], [ 4, -4], [ 4, -10]]}
    state: [0, 0, 0]
    unobstructed: true
