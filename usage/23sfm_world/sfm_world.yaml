world:
  height: 20
  width: 20
  step_time: 0.1
  sample_time: 0.1
  offset: [-10, -10]
  collision_mode: 'unobstructed'   # SFM is reactive; let pedestrians overlap briefly
  control_mode: 'auto'


# Twenty-four pedestrians cross a "+" intersection of two 6.6 m corridors.
# Six head-on pairs run along the horizontal corridor (W->E royalblue
# vs E->W red, six y-lanes y=+/-0.6, +/-1.6, +/-2.6); six more along the
# vertical corridor (S->N green vs N->S orange, six x-lanes at the same
# offsets). Each pair shares a lane line; the return stream is shifted
# 0.001 m below pixel scale so the anisotropic-force angle is non-zero
# and SFM can pick a side. All conflicts happen in the central square,
# resolved by the anisotropic Moussaid-Helbing 2009 social force.
# The L-shaped wall corners
# enter SFM as line obstacles; the outer lane sits 0.9 m clear of each
# wall so the exponential wall force (``sigma_obstacle=0.5``) does not
# overwhelm the social term.
#
# The state/goal/color lists below are interleaved per lane
# (blue,red,blue,red,...,green,orange,...) on purpose: ir-sim's
# ``env.step()`` updates objects sequentially, so adjacent indices
# read each other's freshly integrated state on every tick. Bunching
# all blues first, then all reds, would desynchronise the pair
# coupling and shift the SFM fixed point.
robot:
  - number: 24
    distribution: {name: 'manual'}
    kinematics: {name: 'diff'}
    shape: [{name: 'circle', radius: 0.25}]
    state:
      # ---- horizontal corridor: y = -2.6, -1.6, -0.6, 0.6, 1.6, 2.6 ----
      - [-9, -2.6, 0]
      - [ 9, -2.601, 3.14]
      - [-9, -1.6, 0]
      - [ 9, -1.601, 3.14]
      - [-9, -0.6, 0]
      - [ 9, -0.601, 3.14]
      - [-9,  0.6, 0]
      - [ 9,  0.599, 3.14]
      - [-9,  1.6, 0]
      - [ 9,  1.599, 3.14]
      - [-9,  2.6, 0]
      - [ 9,  2.599, 3.14]
      # ---- vertical corridor: x = -2.6, -1.6, -0.6, 0.6, 1.6, 2.6 ----
      - [-2.6, -9,  1.5708]
      - [-2.601,  9, -1.5708]
      - [-1.6, -9,  1.5708]
      - [-1.601,  9, -1.5708]
      - [-0.6, -9,  1.5708]
      - [-0.601,  9, -1.5708]
      - [ 0.6, -9,  1.5708]
      - [ 0.599,  9, -1.5708]
      - [ 1.6, -9,  1.5708]
      - [ 1.599,  9, -1.5708]
      - [ 2.6, -9,  1.5708]
      - [ 2.599,  9, -1.5708]
    goal:
      - [ 9, -2.6, 0]
      - [-9, -2.601, 3.14]
      - [ 9, -1.6, 0]
      - [-9, -1.601, 3.14]
      - [ 9, -0.6, 0]
      - [-9, -0.601, 3.14]
      - [ 9,  0.6, 0]
      - [-9,  0.599, 3.14]
      - [ 9,  1.6, 0]
      - [-9,  1.599, 3.14]
      - [ 9,  2.6, 0]
      - [-9,  2.599, 3.14]
      - [-2.6,  9,  1.5708]
      - [-2.601, -9, -1.5708]
      - [-1.6,  9,  1.5708]
      - [-1.601, -9, -1.5708]
      - [-0.6,  9,  1.5708]
      - [-0.601, -9, -1.5708]
      - [ 0.6,  9,  1.5708]
      - [ 0.599, -9, -1.5708]
      - [ 1.6,  9,  1.5708]
      - [ 1.599, -9, -1.5708]
      - [ 2.6,  9,  1.5708]
      - [ 2.599, -9, -1.5708]
    color:
      - 'royalblue'   # W->E
      - 'red'         # E->W
      - 'royalblue'
      - 'red'
      - 'royalblue'
      - 'red'
      - 'royalblue'
      - 'red'
      - 'royalblue'
      - 'red'
      - 'royalblue'
      - 'red'
      - 'green'       # S->N
      - 'orange'      # N->S
      - 'green'
      - 'orange'
      - 'green'
      - 'orange'
      - 'green'
      - 'orange'
      - 'green'
      - 'orange'
      - 'green'
      - 'orange'
    behavior:
      name: 'sfm'
      loop: true
      vmax: 0.7
      neighbor_threshold: 5.0
      force_factor_social: 6.0         # Moussaid-Helbing stiffness; raised
                                       # from the 2.1 default for the dense
                                       # 24-agent crossing
      force_factor_obstacle: 8.0       # walls must hold during loop-reset
                                       # momentum transients at the corridor
                                       # mouth
      lambda_importance: 1.0           # weight d_hat more than dv in t:
                                       # cleaner repulsion along line of
                                       # centres at high closing speed
      gamma: 0.5
      sigma_obstacle: 0.6              # wall felt across most of the 6.6 m
                                       # corridor width
      n_angular: 1.5                   # wider angular kernel: agents commit
                                       # to a side earlier in oblique
                                       # encounters
      n_velocity: 2.5                  # wider slowdown kernel
      safety_radius: 0.12              # 0.24 m personal bubble for vmax=0.7
    vel_min: [-1.5, -3.0]
    vel_max: [ 1.5,  3.0]
    arrive_mode: position
    goal_threshold: 1.0              # loop-reset triggers well before the
                                     # agent reaches the wall-flanked exit
                                     # so the wall force can't park it
                                     # outside the arrive radius
    plot:
      show_trail: true
      show_goal: true
      trail_fill: true
      trail_alpha: 0.2
      keep_trail_length: 25


# Four L-shaped walls bound the four corners of the "+" intersection.
# Each corridor is 6.6 m wide (walls at +/- 3.3 m from corridor centreline).
# Obstacles don't ``step()``, so ``number: 4`` with a per-instance
# ``shape`` list is dynamics-neutral and just deduplicates the
# shared ``state`` / ``unobstructed`` fields.
obstacle:
  - number: 4
    distribution: {name: 'manual'}
    state: [0, 0, 0]
    unobstructed: true
    shape:
      - {name: 'linestring', vertices: [[-10,  3.3], [-3.3,  3.3], [-3.3,  10]]}
      - {name: 'linestring', vertices: [[ 10,  3.3], [ 3.3,  3.3], [ 3.3,  10]]}
      - {name: 'linestring', vertices: [[-10, -3.3], [-3.3, -3.3], [-3.3, -10]]}
      - {name: 'linestring', vertices: [[ 10, -3.3], [ 3.3, -3.3], [ 3.3, -10]]}
