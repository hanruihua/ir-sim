world:
  height: 12
  width: 12
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'unobstructed'   # SFM is reactive; let pedestrians overlap briefly
  control_mode: 'auto'


robot:
  - number: 10
    distribution: {name: 'random', range_low: [1, 1, -3.14], range_high: [11, 11, 3.14]}
    kinematics: {name: 'diff'}
    shape:
      - {name: 'circle', radius: 0.25}
    behavior:
      name: 'sfm'
      # SFM tuned to look like cautious pedestrians: slow and socially aware.
      vmax: 0.8
      neighbor_threshold: 5.0
      relaxation_time: 0.5
      force_factor_desired: 0.6
      force_factor_social: 4.0
      force_factor_obstacle: 10.0
      sigma_obstacle: 0.8
      lambda_importance: 2.0
      gamma: 0.35
      n_angular: 2.0
      n_velocity: 3.0
      # Wander mode: every time an agent arrives at its goal, a new random
      # goal is sampled within [range_low, range_high]. The simulation
      # therefore runs forever; pedestrians wander indefinitely.
      wander: true
      range_low:  [1, 1, -3.14]
      range_high: [11, 11, 3.14]
    vel_min: [-1.5, -3.0]
    vel_max: [1.5, 3.0]
    color: ['royalblue', 'red', 'green', 'orange', 'purple',
            'yellow', 'cyan', 'magenta', 'lime', 'pink']
    arrive_mode: position
    goal_threshold: 0.2
    plot:
      show_trail: true
      show_goal: true
      trail_fill: true
      trail_alpha: 0.2
      show_trajectory: false
      keep_trail_length: 15
