world:
  height: 6
  width: 14
  step_time: 0.1
  sample_time: 0.1
  offset: [-7, -3]
  collision_mode: 'unobstructed'
  control_mode: 'auto'


robot:
  - kinematics: {name: 'diff'}
    shape: [{name: 'circle', radius: 0.3}]
    state: [-6, 0, 0]
    goal: [6, 0, 0]
    color: 'royalblue'
    behavior: {name: 'sfm', vmax: 1.0}
    vel_min: [-1.5, -3]
    vel_max: [1.5, 3]
    goal_threshold: 0.2
    arrive_mode: position
    plot: {show_trail: true, show_goal: true, trail_fill: true, trail_alpha: 0.2, keep_trail_length: 30}

  - kinematics: {name: 'diff'}
    shape: [{name: 'circle', radius: 0.3}]
    state: [6, 0.1, 3.14]    # tiny offset breaks the symmetric deadlock
    goal: [-6, 0.1, 3.14]
    color: 'red'
    behavior: {name: 'sfm', vmax: 1.0}
    vel_min: [-1.5, -3]
    vel_max: [1.5, 3]
    goal_threshold: 0.2
    arrive_mode: position
    plot: {show_trail: true, show_goal: true, trail_fill: true, trail_alpha: 0.2, keep_trail_length: 30}
