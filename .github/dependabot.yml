version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      # One PR/month for all minor + patch bumps; major bumps stay separate.
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
